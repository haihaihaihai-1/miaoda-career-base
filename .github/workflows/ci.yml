name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_PATH: /miaoda-career-base

jobs:
  build:
    name: Type-check / Lint / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        brand: [default, hireflow, teaching, campus, lai-lu]
        include:
          - brand: default
            base: /miaoda-career-base/
          - brand: hireflow
            base: /miaoda-career-base/hireflow/
          - brand: teaching
            base: /miaoda-career-base/teaching/
          - brand: campus
            base: /miaoda-career-base/campus/
          - brand: lai-lu
            base: /miaoda-career-base/lai-lu/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build (brand=${{ matrix.brand }})
        run: npx vite build --base=${{ matrix.base }}
        env:
          VITE_BRAND: ${{ matrix.brand }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.brand }}
          path: dist
          retention-days: 7

  docker:
    name: Docker build (default brand)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: miaoda-career-base:ci
          build-args: |
            VITE_BRAND=default
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test
        run: |
          docker run -d --name app -p 8080:80 miaoda-career-base:ci
          sleep 3
          curl -fsS http://127.0.0.1:8080/healthz
          curl -fsS http://127.0.0.1:8080/ | grep -q '<div id="root">'
          docker rm -f app

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download all brand dists
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dists

      - name: Combine into deploy directory
        run: |
          mkdir -p deploy
          echo "--- dists tree ---"
          ls -R dists/
          echo "--- combining default at root ---"
          cp -r dists/dist-default/* deploy/
          echo "--- combining sub-brands ---"
          for brand in hireflow teaching campus lai-lu; do
            src="dists/dist-$brand"
            if [ -d "$src" ]; then
              echo "  + $brand"
              mkdir -p "deploy/$brand"
              cp -r "$src/"* "deploy/$brand/"
            else
              echo "  - $brand (not found)"
            fi
          done
          echo "--- deploy tree ---"
          ls -la deploy/
          for d in hireflow teaching campus lai-lu; do
            [ -d "deploy/$d" ] && echo "  $d: $(ls deploy/$d | head -5)" || echo "  $d: MISSING"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
