name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Type-check / Lint / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        brand: [default, hireflow, teaching, campus, lai-lu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build (brand=${{ matrix.brand }})
        env:
          VITE_BRAND: ${{ matrix.brand }}
        run: npm run build

      - name: Upload dist artifact
        if: matrix.brand == 'default'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.brand }}
          path: dist
          retention-days: 7

  docker:
    name: Docker build (default brand)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: miaoda-career-base:ci
          build-args: |
            VITE_BRAND=default
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test
        run: |
          docker run -d --name app -p 8080:80 miaoda-career-base:ci
          sleep 3
          curl -fsS http://127.0.0.1:8080/healthz
          curl -fsS http://127.0.0.1:8080/ | grep -q '<div id="root">'
          docker rm -f app
